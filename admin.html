<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Photoeze Admin</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="admin-body">

  <header class="admin-header-shell">
    <div class="admin-header-inner">
      <div class="admin-brand">
        <span class="admin-brand-photo">photo</span><span class="admin-brand-eze">eze</span>
        <span class="admin-brand-admin">ADMIN</span>
      </div>
    </div>
  </header>

  <main class="admin-shell">
    <section class="admin-topbar">
      <div class="admin-topbar-left">
        <h1>Admin</h1>
        <p>Manage galleries, uploads, visitors, and orders.</p>
      </div>

      <div class="admin-topbar-right">
       <a href="/" class="admin-nav-btn">View Site</a> 
        <button type="button" id="showGalleriesBtn" class="admin-nav-btn admin-nav-btn-active">Galleries</button>
        <button type="button" id="showVisitorsBtn" class="admin-nav-btn">Visitors</button>
        <button type="button" id="showOrdersBtn" class="admin-nav-btn">Orders</button>
      </div>
    </section>

    <section class="admin-stats-row">
      <div class="admin-stat-card">
        <div class="admin-stat-label">Visits</div>
        <div class="admin-stat-value" id="statVisits">0</div>
      </div>

      <div class="admin-stat-card">
        <div class="admin-stat-label">Purchases</div>
        <div class="admin-stat-value" id="statPurchases">0</div>
      </div>

      <div class="admin-stat-card">
        <div class="admin-stat-label">Revenue</div>
        <div class="admin-stat-value" id="statRevenue">NZ$0.00</div>
      </div>
    </section>

    <section class="admin-main-panel">
      <div id="adminGalleryList"></div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="admin.js"></script>
</body>
</html>
